services:
  - type: web
    name: backrow
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: alembic upgrade head && cd api && uvicorn index:app --host 0.0.0.0 --port 8000
    envVars:
      - key: FRONTEND_URL
        value: https://backrow.onrender.com
      - key: BACKEND_URL
        value: https://backrow.onrender.com
      - key: PYTHON_VERSION
        value: 3.11
