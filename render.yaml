services:
  - type: web
    name: backrow-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd api && uvicorn index:app --host 0.0.0.0 --port 8000
    envVars:
      - key: FRONTEND_URL
        value: https://your-vercel-frontend-url.vercel.app
      - key: DATABASE_URL
        value: sqlite:///./database/database.sqlite3
      - key: PYTHON_VERSION
        value: 3.11
